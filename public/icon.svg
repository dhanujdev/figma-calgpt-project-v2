<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#gradient)"/>
  
  <!-- Gradient -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="24"/>
  
  <!-- Progress Ring (3/4 filled) -->
  <circle 
    cx="256" 
    cy="256" 
    r="180" 
    fill="none" 
    stroke="white" 
    stroke-width="24"
    stroke-dasharray="848 1131"
    stroke-linecap="round"
    transform="rotate(-90 256 256)"
  />
  
  <!-- Center Circle -->
  <circle cx="256" cy="256" r="120" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Calorie Icon -->
  <path d="M256 180 L280 220 L320 230 L288 262 L296 304 L256 282 L216 304 L224 262 L192 230 L232 220 Z" fill="white"/>
  
  <!-- Macro rings (small) -->
  <circle cx="180" cy="380" r="28" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <circle cx="180" cy="380" r="28" fill="none" stroke="white" stroke-width="6" stroke-dasharray="88 176" stroke-linecap="round" transform="rotate(-90 180 380)"/>
  
  <circle cx="256" cy="400" r="28" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <circle cx="256" cy="400" r="28" fill="none" stroke="white" stroke-width="6" stroke-dasharray="110 176" stroke-linecap="round" transform="rotate(-90 256 400)"/>
  
  <circle cx="332" cy="380" r="28" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <circle cx="332" cy="380" r="28" fill="none" stroke="white" stroke-width="6" stroke-dasharray="132 176" stroke-linecap="round" transform="rotate(-90 332 380)"/>
</svg>
