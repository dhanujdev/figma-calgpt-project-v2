<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalGPT V2 Widget</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1720;
      --bg-wash: #172635;
      --card: rgba(12, 24, 34, 0.86);
      --card-strong: rgba(18, 34, 47, 0.96);
      --card-soft: rgba(245, 238, 224, 0.08);
      --line: rgba(196, 178, 138, 0.18);
      --line-strong: rgba(214, 193, 151, 0.32);
      --muted: #9fb3c7;
      --text: #f4f1e8;
      --accent: #8bd3a8;
      --accent-strong: #d7b46a;
      --accent-soft: #243c2f;
      --danger: #f87171;
      --danger-soft: rgba(120, 35, 35, 0.45);
      --ring: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 60px rgba(3, 7, 18, 0.36);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(139, 211, 168, 0.18), transparent 32%),
        radial-gradient(circle at 85% 15%, rgba(215, 180, 106, 0.12), transparent 26%),
        linear-gradient(180deg, #182533 0%, var(--bg) 42%, #081018 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 18px;
    }
    .shell { max-width: 900px; margin: 0 auto; display: grid; gap: 14px; }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 18px 18px 16px;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, rgba(22, 38, 53, 0.96), rgba(8, 16, 24, 0.98));
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -42% auto;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(139, 211, 168, 0.16), transparent 68%);
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 11px;
      color: #d7b46a;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .card {
      background: linear-gradient(180deg, rgba(15, 27, 37, 0.92), rgba(8, 18, 26, 0.96));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .hero-copy {
      max-width: 560px;
      margin-top: 8px;
      color: #c9d6e3;
      font-size: 14px;
      line-height: 1.5;
    }
    .subtle { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .mode-badge {
      white-space: nowrap;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f8ecd1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line-strong);
      font-weight: 700;
    }
    .hero-meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .meta-pill {
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: #d6e1eb;
      font-size: 12px;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 16, 24, 0.7);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }
    .tab {
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 999px;
      padding: 12px 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
    }
    .tab.active {
      background: linear-gradient(135deg, rgba(139, 211, 168, 0.22), rgba(215, 180, 106, 0.12));
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }
    .section-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .section-kicker {
      margin-bottom: 5px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent-strong);
      font-weight: 700;
    }
    .section-title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: 28px;
      line-height: 1.05;
      letter-spacing: -0.025em;
    }
    .section-subtitle {
      margin-top: 6px;
      max-width: 560px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 0.8fr);
      gap: 14px;
      margin-bottom: 14px;
    }
    .focus-panel,
    .section-block {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015));
      padding: 14px;
    }
    .focus-panel.soft {
      background: linear-gradient(180deg, rgba(139, 211, 168, 0.08), rgba(255, 255, 255, 0.02));
    }
    .section-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-block-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .section-block-copy {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .ring-wrap { display: flex; justify-content: center; padding: 6px 0 4px; }
    .ring { position: relative; width: 220px; height: 220px; }
    .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .ring-value {
      font-size: 46px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .mini-grid,
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .mini,
    .stat-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }
    .mini strong,
    .stat-card strong { display: block; font-size: 20px; margin-top: 5px; }
    .mini .subtle,
    .stat-card .subtle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .list { display: grid; gap: 10px; margin-top: 12px; }
    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.025);
    }
    .item-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .item-note {
      margin-top: 10px;
      padding: 9px 11px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: #d8e0e8;
      font-size: 12px;
      line-height: 1.5;
    }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .badge {
      font-size: 12px;
      background: rgba(139, 211, 168, 0.08);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: #dff3e7;
    }
    .table { display: grid; gap: 6px; margin-top: 10px; }
    .table-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.03);
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(135deg, var(--accent), #d7b46a);
      color: #102116;
      border-color: transparent;
    }
    button.ghost { background: transparent; }
    button.delete-btn {
      background: transparent;
      border: 1px solid #7f1d1d;
      color: var(--danger);
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 8px;
    }
    button.delete-btn.confirm {
      background: #7f1d1d;
      color: #fee2e2;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8, 16, 24, 0.85);
      color: var(--text);
      padding: 10px 11px;
    }
    .grid { display: grid; gap: 10px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.02);
    }
    .error { border-color: #7f1d1d; background: linear-gradient(180deg, #4a1212, #2d0a0a); color: #fecaca; }
    .checkin-card {
      margin-top: 6px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(14, 28, 39, 0.92), rgba(9, 19, 27, 0.98));
    }
    .checkin-card p { margin: 6px 0; font-size: 13px; }
    .checkin-section { margin-top: 14px; }
    .checkin-section strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent-strong);
    }
    .checkin-list { display: grid; gap: 6px; }
    .checkin-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      color: #d7e2eb;
      background: rgba(255, 255, 255, 0.03);
      line-height: 1.5;
    }
    .review-card { display: grid; gap: 12px; }
    .review-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .review-stat {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }
    .review-stat strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }
    .pattern-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
    }
    .pattern-card.positive {
      border-color: rgba(139, 211, 168, 0.42);
      background: rgba(22, 64, 46, 0.52);
    }
    .pattern-card.warning {
      border-color: rgba(215, 180, 106, 0.36);
      background: rgba(56, 39, 14, 0.4);
    }
    .pattern-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pattern-code {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .review-list { display: grid; gap: 8px; }
    .hint-card {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 13px;
      background: rgba(255, 255, 255, 0.035);
      color: #d6e1e9;
      font-size: 13px;
      line-height: 1.5;
    }
    .status-card {
      margin-bottom: 12px;
      border: 1px solid rgba(139, 211, 168, 0.4);
      border-radius: 16px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(17, 63, 43, 0.8), rgba(10, 39, 27, 0.92));
      color: #dcfce7;
    }
    .status-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .status-card ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
    .status-card li {
      margin: 4px 0;
      color: #bbf7d0;
      font-size: 13px;
    }
    .prompt-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .prompt-chip {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      color: #eef5fb;
      font-family: "SFMono-Regular", SFMono-Regular, ui-monospace, Menlo, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .recovery-card {
      margin-top: 12px;
      border: 1px solid rgba(248, 113, 113, 0.38);
      border-radius: 16px;
      padding: 12px;
      background: rgba(82, 21, 21, 0.76);
      color: #fed7aa;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .settings-grid .item strong {
      display: block;
      margin-top: 6px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }
    .settings-grid .item .subtle {
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
    }
    @media (max-width: 640px) {
      body { padding: 14px; }
      .hero,
      .card { padding: 15px; border-radius: 18px; }
      .hero-top,
      .section-header { flex-direction: column; align-items: flex-start; }
      .title { font-size: 28px; }
      .section-title { font-size: 24px; }
      .grid.two { grid-template-columns: 1fr; }
      .overview-grid { grid-template-columns: 1fr; }
      .mini-grid,
      .stat-grid { grid-template-columns: 1fr; }
      .ring { width: 190px; height: 190px; }
      .ring-value { font-size: 36px; }
      .review-grid { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
      .table-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow">Nutrition Coach</div>
          <h1 class="title">CalGPT V2</h1>
          <div class="hero-copy">Ask in chat for every write. Use this widget to read your dashboard, progress, settings, check-ins, and weekly review without guessing what changed.</div>
        </div>
        <span class="mode-badge" id="mode">demo</span>
      </div>
      <div class="hero-meta">
        <div class="meta-pill">Agent-only writes</div>
        <div class="meta-pill">Read-only widget</div>
        <div class="meta-pill">Built for quick in-chat review</div>
        <div class="meta-pill">Widget v13</div>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Widget pages">
      <button class="tab active" data-page="home">Home</button>
      <button class="tab" data-page="progress">Progress</button>
      <button class="tab" data-page="settings">Settings</button>
    </div>

    <div id="content" class="card">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <script>
    const WIDGET_VERSION = 'v13';
    const state = {
      page: 'home',
      homeView: 'dashboard',
      model: null,
      progress: null,
      busy: false,
      error: '',
      checkinData: null,
      weeklyReview: null,
      lastAction: null,
      mode: 'demo',
    };

    const DEFAULT_STARTER_PROMPTS = [
      'Show my dashboard.',
      'Log breakfast: Greek yogurt, berries, and granola for 350 calories.',
      'Log my weight as 75.8 kg.',
      'Run my daily check-in.',
      'Run my weekly review.',
    ];

    // --- XSS protection ---
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // --- Unit preference helpers ---
    function energyLabel(prefs) {
      return (prefs?.unitEnergy === 'kj') ? 'kJ' : 'kcal';
    }

    function convertEnergy(value, prefs) {
      if (prefs?.unitEnergy === 'kj') return Math.round(Number(value || 0) * 4.184);
      return Math.round(Number(value || 0));
    }

    function weightLabel(prefs) {
      return (prefs?.unitWeight === 'lb') ? 'lb' : 'kg';
    }

    function convertWeight(value, prefs) {
      if (prefs?.unitWeight === 'lb') return Math.round(Number(value || 0) * 2.20462 * 10) / 10;
      return Math.round(Number(value || 0) * 10) / 10;
    }

    function notifyHeight() {
      window.openai?.notifyIntrinsicHeight?.();
    }

    function saveWidgetState() {
      window.openai?.setWidgetState?.({ page: state.page, homeView: state.homeView });
    }

    function calculateProgress(current, goal) {
      if (!goal || goal <= 0) return 0;
      return Math.min((Number(current || 0) / Number(goal || 0)) * 100, 100);
    }

    function dasharray(progress, radius) {
      const c = 2 * Math.PI * radius;
      return `${(progress / 100) * c} ${c}`;
    }

    function fmtDate(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00Z`);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
    }

    function fmtTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function fmtValue(value, fallback = 'Not set') {
      if (value === null || value === undefined || value === '') return fallback;
      return String(value);
    }

    function onboardingGuide() {
      const guide = state.model?.onboarding || {};
      return {
        isNewUser: Boolean(guide.isNewUser),
        summary: guide.summary || 'Ask CalGPT in chat to log food, log weight, update goals, or run a coaching review.',
        suggestedPrompt: guide.suggestedPrompt || DEFAULT_STARTER_PROMPTS[0],
        starterPrompts: Array.isArray(guide.starterPrompts) && guide.starterPrompts.length > 0
          ? guide.starterPrompts
          : DEFAULT_STARTER_PROMPTS,
      };
    }

    function renderPromptGuide(title, summaryOverride = '') {
      const guide = onboardingGuide();
      const summary = summaryOverride || guide.summary;

      return `
        <div class="hint-card">
          <strong>${escapeHtml(title)}</strong>
          <div style="margin-top:6px">${escapeHtml(summary)}</div>
          <div class="prompt-list">
            ${guide.starterPrompts.map((prompt) => `<div class="prompt-chip">${escapeHtml(prompt)}</div>`).join('')}
          </div>
          <div class="subtle" style="margin-top:10px">Suggested first prompt: ${escapeHtml(guide.suggestedPrompt)}</div>
        </div>
      `;
    }

    function renderPageHeader(kicker, title, subtitle) {
      return `
        <div class="section-header">
          <div>
            <div class="section-kicker">${escapeHtml(kicker)}</div>
            <h2 class="section-title">${escapeHtml(title)}</h2>
            <div class="section-subtitle">${escapeHtml(subtitle)}</div>
          </div>
          <button class="ghost" data-action="sync">Refresh</button>
        </div>
      `;
    }

    function renderLastAction() {
      const action = state.lastAction;
      if (!action || !action.summary) return '';
      const lines = Array.isArray(action.detailLines) ? action.detailLines.filter(Boolean) : [];
      return `
        <div class="status-card">
          <strong>${escapeHtml(action.title || 'Last update')}</strong>
          <div>${escapeHtml(action.summary)}</div>
          ${
            lines.length > 0
              ? `<ul>${lines.map((line) => `<li>${escapeHtml(line)}</li>`).join('')}</ul>`
              : ''
          }
        </div>
      `;
    }

    async function callTool(name, args = {}) {
      if (window.openai?.callTool) {
        return window.openai.callTool(name, args);
      }

      const response = await fetch('/mcp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          jsonrpc: '2.0',
          id: Date.now(),
          method: 'tools/call',
          params: { name, arguments: args },
        }),
      });

      const payload = await response.json();
      if (!response.ok || payload.error) {
        throw new Error(payload?.error?.message || `Tool ${name} failed`);
      }
      if (payload.result?.isError) {
        const telemetry = payload.result?.structuredContent?.telemetry;
        const versionHint = telemetry?.widgetVersion
          ? ` [${telemetry.widgetVersion}/${telemetry.failureClass || 'tool_error'}]`
          : '';
        throw new Error((payload.result?.content?.[0]?.text || `Tool ${name} failed`) + versionHint);
      }
      return payload.result?.structuredContent || {};
    }

    function hydrateFromOutput() {
      const output = window.openai?.toolOutput;
      const widgetState = window.openai?.widgetState || {};
      const savedPage = widgetState.page;
      const savedHomeView = widgetState.homeView;
      if (widgetState.page) {
        state.page = widgetState.page;
      }
      if (widgetState.homeView) {
        state.homeView = widgetState.homeView;
      }
      if (!output || typeof output !== 'object') return false;

      state.mode = output.mode || output.state?.mode || state.mode;
      state.lastAction = output.actionSummary || null;

      if (output.review) {
        state.weeklyReview = output.review;
        state.checkinData = null;
        state.homeView = 'review';
        state.page = savedHomeView === 'review' && savedPage ? savedPage : 'home';
      }

      if (output.checkin) {
        state.checkinData = output.checkin;
        state.weeklyReview = null;
        state.homeView = 'checkin';
        state.page = savedHomeView === 'checkin' && savedPage ? savedPage : 'home';
      }

      if (output.state && output.progress) {
        state.model = output.state;
        state.progress = output.progress;
        if (!output.review && !output.checkin) {
          state.homeView = 'dashboard';
          if (savedHomeView === 'dashboard' && savedPage) {
            state.page = savedPage;
          }
        }
      } else {
        const hasDaily = output.goals && Array.isArray(output.meals);
        if (hasDaily) {
          state.model = output;
          if (!output.review && !output.checkin) {
            state.homeView = 'dashboard';
            if (savedHomeView === 'dashboard' && savedPage) {
              state.page = savedPage;
            }
          }
        }
        if (output.progress) {
          state.progress = output.progress;
          if (!hasDaily && !output.review && !output.checkin) {
            state.page = savedHomeView === 'dashboard' && savedPage ? savedPage : 'progress';
          }
        }
      }

      if (!output.review && !output.checkin && !output.state && !(output.goals && Array.isArray(output.meals))) {
        state.homeView = savedHomeView || state.homeView;
      }

      return Boolean(state.model || state.progress || state.weeklyReview || state.checkinData);
    }

    async function sync(page = state.page) {
      state.busy = true;
      state.error = '';
      render();
      try {
        const payload = await callTool('sync_state', { page, range: '90D' });
        if (payload.state) {
          state.model = payload.state;
        } else if (payload.goals && Array.isArray(payload.meals)) {
          state.model = payload;
        }
        if (payload.progress) state.progress = payload.progress;
        state.weeklyReview = null;
        state.checkinData = null;
        state.lastAction = null;
        state.homeView = 'dashboard';
        state.mode = payload.mode || state.mode;
        state.page = page;
        saveWidgetState();
      } catch (error) {
        state.error = String(error);
      } finally {
        state.busy = false;
        render();
      }
    }

    function renderWeeklyReview() {
      const review = state.weeklyReview;
      const prefs = state.model?.preferences || {};
      const eLabel = energyLabel(prefs);
      const wLabel = weightLabel(prefs);
      const patterns = Array.isArray(review?.patterns) ? review.patterns : [];
      const actionPlan = Array.isArray(review?.actionPlan) ? review.actionPlan : [];

      if (!review) return '<div class="empty">No weekly review available.</div>';

      return `
        ${renderLastAction()}
        <div class="review-card">
          ${renderPageHeader('Weekly coaching', 'Weekly Review', 'The weekly view keeps the big signals, recurring patterns, and the shortest next-move list in one place.')}
          <div class="review-grid">
            <div class="review-stat">
              <div class="subtle">Average intake</div>
              <strong>${convertEnergy(review.consumedAverage, prefs)} ${escapeHtml(eLabel)}</strong>
            </div>
            <div class="review-stat">
              <div class="subtle">Calorie goal</div>
              <strong>${convertEnergy(review.calorieGoal, prefs)} ${escapeHtml(eLabel)}</strong>
            </div>
            <div class="review-stat">
              <div class="subtle">7-day weight change</div>
              <strong>${Number(review.weightDelta7 || 0).toFixed(1)} ${escapeHtml(wLabel)}</strong>
            </div>
          </div>
          ${
            review.goalProjection
              ? `
                <div class="pattern-card positive">
                  <div class="pattern-head">
                    <strong>Goal Projection</strong>
                    <span class="pattern-code">${escapeHtml(review.goalProjection.direction || '')}</span>
                  </div>
                  <div class="subtle">
                    At ${Number(review.goalProjection.weeklyRate || 0).toFixed(2)} ${escapeHtml(wLabel)}/week, goal is projected around ${escapeHtml(review.goalProjection.projectedDate || '')}.
                  </div>
                </div>
              `
              : ''
          }
          <div class="checkin-section">
            <strong>Insights</strong>
            <div class="review-list">
              ${(review.insights || []).map((item) => `<div class="checkin-item">${escapeHtml(item)}</div>`).join('') || '<div class="empty">No summary insights yet.</div>'}
            </div>
          </div>
          <div class="checkin-section">
            <strong>Patterns</strong>
            <div class="review-list">
              ${
                patterns.length > 0
                  ? patterns.map((pattern) => `
                      <div class="pattern-card ${escapeHtml(pattern.severity || 'warning')}">
                        <div class="pattern-head">
                          <strong>${escapeHtml(String(pattern.code || '').replace(/_/g, ' '))}</strong>
                          <span class="pattern-code">${escapeHtml(pattern.code || '')}</span>
                        </div>
                        <div class="subtle">${escapeHtml(pattern.message || '')}</div>
                        <div class="item-note" style="margin-top:10px"><strong>Next move</strong><div>${escapeHtml(pattern.action || '')}</div></div>
                      </div>
                    `).join('')
                  : '<div class="empty">No strong weekly patterns detected.</div>'
              }
            </div>
          </div>
          <div class="checkin-section">
            <strong>Action Plan</strong>
            <div class="review-list">
              ${
                actionPlan.length > 0
                  ? actionPlan.map((item) => `<div class="checkin-item">${escapeHtml(item)}</div>`).join('')
                  : '<div class="empty">No action plan available.</div>'
              }
            </div>
          </div>
          <div class="hint-card">Ask CalGPT in chat to run another weekly review or change any nutrition data.</div>
        </div>
      `;
    }

    function renderCheckin() {
      const checkin = state.checkinData;
      if (!checkin) return '<div class="empty">No daily check-in available.</div>';

      const observations = Array.isArray(checkin.observations) ? checkin.observations : [];
      const recommendations = Array.isArray(checkin.recommendations) ? checkin.recommendations : [];

      return `
        ${renderLastAction()}
        <div class="checkin-card">
          ${renderPageHeader('Daily coaching', 'Daily Check-in', 'Scan this first for short-horizon patterns, then act in chat if you want to change meals, goals, or preferences.')}
          ${
            observations.length > 0
              ? `
                <div class="checkin-section">
                  <strong>Patterns</strong>
                  <div class="checkin-list">
                    ${observations.map((note) => `<div class="checkin-item">${escapeHtml(note)}</div>`).join('')}
                  </div>
                </div>
              `
              : '<div class="empty">No notable patterns yet.</div>'
          }
          ${
            recommendations.length > 0
              ? `
                <div class="checkin-section">
                  <strong>Recommendations</strong>
                  <div class="checkin-list">
                    ${recommendations.map((note) => `<div class="checkin-item">${escapeHtml(note)}</div>`).join('')}
                  </div>
                </div>
              `
              : ''
          }
          <div class="hint-card">Ask CalGPT in chat to run a new daily check-in or update meals, goals, and preferences.</div>
        </div>
      `;
    }

    function renderHome() {
      const model = state.model;
      if (state.homeView === 'review' && state.weeklyReview) return renderWeeklyReview();
      if (state.homeView === 'checkin' && state.checkinData) return renderCheckin();
      if (!model && state.weeklyReview) return renderWeeklyReview();
      if (!model && state.checkinData) return renderCheckin();
      if (!model) {
        return `
          ${renderLastAction()}
          ${renderPageHeader('Dashboard', 'Home', 'Start from chat, then use the widget as a stable readout of what the agent changed.')}
          ${renderPromptGuide('Start in chat', 'Ask CalGPT in chat to show your dashboard or log your first meal. The widget updates after the agent acts.')}
        `;
      }

      const prefs = model.preferences || {};
      const eLabel = energyLabel(prefs);
      const progress = calculateProgress(model.totalCalories, model.goals.calories);
      const mainColor = progress <= 100 ? '#34d399' : '#ef4444';
      const meals = Array.isArray(model.meals) ? model.meals : [];
      const displayCal = convertEnergy(model.totalCalories, prefs);
      const goalCal = convertEnergy(model.goals.calories, prefs);
      const showStarterGuide = Boolean(model.onboarding?.isNewUser);

      return `
        ${renderLastAction()}
        ${renderPageHeader('Dashboard', 'Today', `${fmtDate(model.date)}. Read calories first, then macros, then meals.`)}
        ${showStarterGuide ? renderPromptGuide('Start here', 'New users succeed fastest by asking for one concrete action in chat. Try one of these prompts.') : ''}
        <div class="overview-grid">
          <div class="focus-panel soft">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Daily energy</div>
                <div class="section-block-copy">This is the fastest read on how far through today's target you are.</div>
              </div>
            </div>
            <div class="ring-wrap">
              <div class="ring">
                <svg viewBox="0 0 220 220">
                  <circle cx="110" cy="110" r="95" fill="none" stroke="var(--ring)" stroke-width="14"></circle>
                  <circle cx="110" cy="110" r="95" fill="none" stroke="${mainColor}" stroke-width="14" stroke-linecap="round" stroke-dasharray="${dasharray(progress, 95)}"></circle>
                </svg>
                <div class="ring-center">
                  <div class="ring-value" style="color:${mainColor}">${displayCal}</div>
                  <div class="subtle">of ${goalCal} ${escapeHtml(eLabel)}</div>
                </div>
              </div>
            </div>
          </div>
          <div class="section-block">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Macro snapshot</div>
                <div class="section-block-copy">Use this quick strip before deciding whether to ask for a meal suggestion or a coaching review.</div>
              </div>
            </div>
            <div class="mini-grid" style="margin-top:0">
              <div class="mini"><div class="subtle">Protein</div><strong style="color:#8ec5ff">${Math.round(model.totalProtein || 0)}</strong></div>
              <div class="mini"><div class="subtle">Carbs</div><strong style="color:#f5c67b">${Math.round(model.totalCarbs || 0)}</strong></div>
              <div class="mini"><div class="subtle">Fats</div><strong style="color:#d9b3ff">${Math.round(model.totalFats || 0)}</strong></div>
            </div>
            <div class="hint-card" style="margin-top:10px">Ask CalGPT in chat to log, edit, or delete meals. The widget stays read-only so the visible state stays reliable.</div>
          </div>
        </div>
        <div class="section-block">
          <div class="section-block-header">
            <div>
              <div class="section-block-title">Meals</div>
              <div class="section-block-copy">Recent entries for the current day. If totals look off, ask the agent in chat to correct the specific meal.</div>
            </div>
          </div>
        <div class="list">
          ${
            meals.length === 0
              ? `
                <div class="empty">No meals logged yet.</div>
                ${renderPromptGuide('Log a first meal', 'Use one short chat prompt with the meal name and an estimate if needed.')}
              `
              : meals
                  .map(
                    (meal) => `
                      <div class="item">
                        <div class="item-head">
                          <strong>${escapeHtml(meal.name)}</strong>
                          <span class="subtle">${fmtTime(meal.timestamp)}</span>
                        </div>
                        <div class="subtle">${convertEnergy(meal.calories, prefs)} ${escapeHtml(eLabel)} · P${Math.round(meal.protein || 0)} C${Math.round(meal.carbs || 0)} F${Math.round(meal.fats || 0)}</div>
                        ${
                          meal.estimationNotes
                            ? `<div class="item-note"><strong>Estimate note</strong><div>${escapeHtml(meal.estimationNotes)}</div></div>`
                            : ''
                        }
                      </div>
                    `,
                  )
                  .join('')
          }
        </div>
        </div>
      `;
    }

    function renderProgress() {
      const progress = state.progress;
      if (!progress) {
        return `
          ${renderLastAction()}
          ${renderPageHeader('Progress', 'Progress', 'This page becomes useful after the first weigh-in. Log weight in chat and the chart-ready summary appears here.')}
          ${renderPromptGuide('No progress data yet', 'Ask CalGPT in chat to log your current weight. Progress will appear here after the agent saves it.')}
        `;
      }

      const prefs = state.model?.preferences || {};
      const wLabel = weightLabel(prefs);
      const eLabel = energyLabel(prefs);
      const hasWeights = Array.isArray(progress.weightSeries) && progress.weightSeries.length > 0;

      return `
        ${renderLastAction()}
        ${renderPageHeader('Progress', 'Weight and trends', 'Start at current weight, then scan streak, BMI, and directional changes.')}
        <div class="hint-card">Ask CalGPT in chat to log weight. The progress surface updates after the agent writes the new value.</div>
        ${!hasWeights ? renderPromptGuide('Log a first weigh-in', 'A simple chat prompt like “Log my weight as 75.8 kg” is enough.') : ''}
        <div class="overview-grid">
          <div class="focus-panel soft">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Current position</div>
                <div class="section-block-copy">A compact readout of the latest saved status.</div>
              </div>
            </div>
            <div class="stat-grid" style="margin-top:0">
              <div class="stat-card"><div class="subtle">Current weight</div><strong>${convertWeight(progress.currentWeight, prefs)} ${escapeHtml(wLabel)}</strong></div>
              <div class="stat-card"><div class="subtle">Daily avg ${escapeHtml(eLabel)}</div><strong>${convertEnergy(progress.dailyAverageCalories, prefs)}</strong></div>
              <div class="stat-card"><div class="subtle">Streak</div><strong>${progress.streak?.current || 0} days</strong></div>
            </div>
            <div class="hint-card" style="margin-top:10px">BMI is ${progress.bmi?.value || 0} (${escapeHtml(progress.bmi?.status || 'Unknown')}). Ask in chat if you want to update goal weight or target date next.</div>
          </div>
          <div class="section-block">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Badges and momentum</div>
                <div class="section-block-copy">These badges are intentionally simple. The goal is fast trust, not gamification noise.</div>
              </div>
            </div>
            <div class="badges" style="margin-top:2px">
              ${
                (progress.badges || []).length === 0
                  ? '<span class="subtle">No badges yet</span>'
                  : progress.badges.map((badge) => `<span class="badge">${escapeHtml(badge)}</span>`).join('')
              }
            </div>
            <div class="hint-card" style="margin-top:10px">Consumed ${convertEnergy(progress.weeklyEnergy?.consumed, prefs)} ${escapeHtml(eLabel)} this week.</div>
          </div>
        </div>
        <div class="section-block" style="margin-top:14px">
          <div class="section-block-header">
            <div>
              <div class="section-block-title">Weight changes</div>
              <div class="section-block-copy">Short windows first, then the longer trend. This is optimized for a 5-second scan inside ChatGPT.</div>
            </div>
          </div>
        <div class="table">
          ${(progress.weightChanges || [])
            .map(
              (row) => `<div class="table-row"><span>${escapeHtml(row.label)}</span><span>${Number(row.delta || 0).toFixed(1)} ${escapeHtml(wLabel)}</span><span class="subtle">${escapeHtml(row.trend)}</span></div>`,
            )
            .join('')}
        </div>
        </div>
      `;
    }

    function renderSettings() {
      const model = state.model;
      if (!model) {
        return `
          ${renderLastAction()}
          ${renderPageHeader('Settings', 'Settings', 'This page summarizes the current configuration. Use chat when you want to change it.')}
          ${renderPromptGuide('Set goals in chat', 'Ask CalGPT in chat to update calories, macros, goal weight, reminders, or units.')}
        `;
      }

      const goals = model.goals || {};
      const prefs = model.preferences || {};
      const eLabel = energyLabel(prefs);
      const wLabel = weightLabel(prefs);
      const showStarterGuide = Boolean(model.onboarding?.isNewUser);

      return `
        ${renderLastAction()}
        ${renderPageHeader('Settings', 'Goals and preferences', 'This is a clean summary of what is saved right now, not a disabled form.')}
        <div class="hint-card">Ask CalGPT in chat to update goals or preferences, suggest goal changes, or run a daily check-in or weekly review.</div>
        ${showStarterGuide ? renderPromptGuide('Personalize CalGPT', 'Early on, the highest-value settings are calorie goal, protein goal, goal weight, and unit preferences.') : ''}
        <div class="overview-grid" style="margin-top:14px">
          <div class="section-block">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Goals</div>
                <div class="section-block-copy">The highest-value items are energy target, protein target, goal weight, and target date.</div>
              </div>
            </div>
            <div class="settings-grid" style="margin-top:0">
              <div class="item"><div class="subtle">Calories goal (${escapeHtml(eLabel)})</div><strong>${convertEnergy(goals.calories || 0, prefs)}</strong></div>
              <div class="item"><div class="subtle">Protein goal</div><strong>${fmtValue(goals.protein)}</strong></div>
              <div class="item"><div class="subtle">Carbs goal</div><strong>${fmtValue(goals.carbs)}</strong></div>
              <div class="item"><div class="subtle">Fats goal</div><strong>${fmtValue(goals.fats)}</strong></div>
              <div class="item"><div class="subtle">Goal weight (${escapeHtml(wLabel)})</div><strong>${fmtValue(goals.goalWeight)}</strong></div>
              <div class="item"><div class="subtle">Start weight (${escapeHtml(wLabel)})</div><strong>${fmtValue(goals.startWeight)}</strong></div>
              <div class="item"><div class="subtle">Target date</div><strong>${escapeHtml(fmtValue(goals.targetDate))}</strong></div>
            </div>
          </div>
          <div class="section-block">
            <div class="section-block-header">
              <div>
                <div class="section-block-title">Preferences</div>
                <div class="section-block-copy">These affect how the assistant formats guidance and when reminders or badge notifications are shown.</div>
              </div>
            </div>
            <div class="settings-grid" style="margin-top:0">
              <div class="item"><div class="subtle">Weight unit</div><strong>${escapeHtml(fmtValue(prefs.unitWeight, 'kg'))}</strong></div>
              <div class="item"><div class="subtle">Energy unit</div><strong>${escapeHtml(fmtValue(prefs.unitEnergy, 'kcal'))}</strong></div>
              <div class="item"><div class="subtle">Language</div><strong>${escapeHtml(fmtValue(prefs.language, 'en'))}</strong></div>
              <div class="item"><div class="subtle">Reminder time</div><strong>${escapeHtml(fmtValue(prefs.reminderTime, '20:00'))}</strong></div>
              <div class="item"><div class="subtle">Height (cm)</div><strong>${escapeHtml(fmtValue(Math.round(prefs.heightCm || 0) || '', 'Not set'))}</strong></div>
              <div class="item"><div class="subtle">Notifications</div><strong>${prefs.streakBadgeNotifications === false ? 'Off' : 'On'}</strong></div>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      document.getElementById('mode').textContent = state.model?.mode || state.mode || 'demo';
      const content = document.getElementById('content');

      if (state.error) {
        content.className = 'card error';
        content.innerHTML = `
          <strong>Widget needs a fresh sync</strong>
          <div style="margin-top:6px">${escapeHtml(state.error)}</div>
          <div class="recovery-card">
            Try Refresh first. If the issue continues, ask CalGPT in chat to show your dashboard again or repeat the action in plain language.
          </div>
          <div class="subtle" style="margin-top:10px">Widget ${WIDGET_VERSION}</div>
          ${renderPromptGuide('Recovery prompts', 'These chat prompts usually restore the latest state cleanly.')}
        `;
        notifyHeight();
        return;
      }

      content.className = 'card';
      if (state.busy) {
        content.innerHTML = '<div class="empty">Loading...</div>';
        notifyHeight();
        return;
      }

      const renderPage = state.page;

      if (renderPage === 'home') content.innerHTML = renderHome();
      if (renderPage === 'progress') content.innerHTML = renderProgress();
      if (renderPage === 'settings') content.innerHTML = renderSettings();

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.classList.toggle('active', tab.getAttribute('data-page') === renderPage);
      });

      notifyHeight();
    }

    document.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const page = target.getAttribute('data-page');
      if (page) {
        state.page = page;
        if (page === 'home') {
          state.homeView = 'dashboard';
        }
        saveWidgetState();
        if ((page === 'home' || page === 'settings') && !state.model) {
          await sync(page);
          return;
        }
        if (page === 'progress' && !state.progress) {
          await sync(page);
          return;
        }
        render();
        return;
      }

      const action = target.getAttribute('data-action');
      if (!action) return;

      try {
        state.error = '';

        if (action === 'sync') {
          await sync(state.page);
          return;
        }
      } catch (error) {
        state.error = String(error);
      } finally {
        state.busy = false;
        render();
      }
    });

    window.addEventListener('openai:set_globals', () => {
      hydrateFromOutput();
      render();
    }, { passive: true });

    async function boot() {
      if (!hydrateFromOutput()) {
        await sync(state.page);
      } else {
        render();
      }
    }

    boot();
  </script>
</body>
</html>
