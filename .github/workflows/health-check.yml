name: MCP Health Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-health-check
  cancel-in-progress: true

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke production MCP
        env:
          MCP_BASE_URL: https://figma-calgpt-project-v2.vercel.app/mcp
        run: npm run smoke:mcp
