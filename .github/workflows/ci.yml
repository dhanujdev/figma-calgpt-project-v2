name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run strict gate
        run: npm run test:strict

  vercel-preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview artifact
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Vercel preview
        id: deploy
        run: |
          deployment_url="$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Smoke preview MCP
        run: MCP_BASE_URL=${{ steps.deploy.outputs.deployment_url }}/mcp npm run smoke:mcp

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = ${{ toJson(steps.deploy.outputs.deployment_url) }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Vercel preview: ${url}\n\nMCP smoke: passed.`,
            });
